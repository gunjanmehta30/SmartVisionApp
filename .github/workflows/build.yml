name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK inside official Kivy Buildozer container
        run: |
          sudo docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug" 2>&1 | tee build_log.txt

      - name: Show last 100 lines if failed
        if: failure()
        run: tail -n 100 build_log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartvision-apk
          path: bin/*.apk